<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FSAE Suspension — Interactive 3D</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #000000; --panel: rgba(3,3,3,0.94); --line: #242424;
    --text: #ffffff; --dim: #b8b8b8; --accent: #ffffff;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               height: 100vh; overflow: hidden; }
  #viewer { position: absolute; inset: 0; }
  #title-bar { position: absolute; top: 22px; left: 24px; z-index: 10; pointer-events: none; }
  #title-bar h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
                  color: var(--text); }
  #title-bar .sub { color: var(--dim); font-size: 13px; margin-top: 4px; }
  #info-panel {
    position: absolute; top: 22px; right: 22px; width: 360px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 20px 22px; backdrop-filter: blur(12px); z-index: 10;
    max-height: calc(100vh - 80px); overflow-y: auto;
    transition: border-color 0.15s;
  }
  #info-panel.active { border-color: #555; }
  #info-panel h2 { margin: 0 0 10px; font-size: 16px; font-weight: 600;
                   color: var(--accent); letter-spacing: 0.01em;
                   text-transform: uppercase; }
  #info-panel p { margin: 0 0 12px; line-height: 1.55; color: var(--text); font-size: 13px; }
  .specs { display: grid; grid-template-columns: 1fr auto; gap: 5px 12px;
           padding: 12px 14px; background: rgba(0,0,0,0.4);
           border: 1px solid #242424; border-radius: 6px; font-size: 12.5px; }
  .specs span:nth-child(odd) { color: var(--dim); }
  .specs span:nth-child(even) { font-family: 'SF Mono', Consolas, Menlo, monospace;
                                color: var(--text); text-align: right; }
  .mini-chart { margin-top: 12px; padding: 10px 12px; background: rgba(0,0,0,0.4);
                border: 1px solid #242424; border-radius: 6px; }
  .mini-chart-title { font-size: 10.5px; color: var(--dim); margin-bottom: 6px;
                      letter-spacing: 0.06em; text-transform: uppercase; }
  #legend { position: absolute; bottom: 20px; left: 20px; z-index: 10;
            background: var(--panel); border: 1px solid var(--line);
            border-radius: 8px; padding: 10px 14px; font-size: 11.5px;
            color: var(--dim); }
  #legend strong { color: var(--text); }
  #parts-list { position: absolute; bottom: 20px; right: 22px; z-index: 10;
                background: var(--panel); border: 1px solid var(--line);
                border-radius: 8px; padding: 8px; display: flex; flex-direction: column;
                gap: 2px; font-size: 12px; }
  .part-btn { background: transparent; border: none; color: var(--dim);
              padding: 5px 12px; text-align: left; cursor: pointer; border-radius: 4px;
              font-family: inherit; font-size: 12px; }
  .part-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .part-btn.active { color: var(--accent); background: rgba(255,255,255,0.06); }
</style>
</head>
<body>

<div id="viewer"></div>

<div id="title-bar">
  <h1>FSAE Suspension</h1>
  <div class="sub">Hover or click any part for details</div>
</div>

<div id="info-panel">
  <h2 id="panel-title">Double-Wishbone Layout</h2>
  <p id="panel-body">Hover any component in the 3D view, or pick from the list. Drag to orbit, scroll to zoom.</p>
  <div id="panel-extras"></div>
</div>

<div id="parts-list">
  <button class="part-btn" data-group="wishbones">Wishbones</button>
  <button class="part-btn" data-group="steering">Steering &amp; Rack</button>
  <button class="part-btn" data-group="spring-damper">Pushrod / Rocker / Spring</button>
  <button class="part-btn" data-group="upright">Upright / Kingpin</button>
  <button class="part-btn" data-group="wheels">Wheels &amp; Tires</button>
  <button class="part-btn" data-group="cg">Centre of Gravity</button>
  <button class="part-btn" data-group="roll-axis">Roll Axis</button>
  <button class="part-btn" data-group="pitch-axis">Pitch Axis</button>
</div>

<div id="legend"><strong>Controls:</strong> Drag orbit · Scroll zoom · Right-drag pan</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── HARDPOINTS (m, X=lateral outboard+, Y=longitudinal fwd+, Z=up) ──────
const FRONT_HP = {
  uca_front:  [0.26353,-0.12700,0.26353], uca_rear:[0.23243,0.12700,0.24877], uca_outer:[0.48260,0.00912,0.28598],
  lca_front:  [0.21590,-0.11748,0.12065], lca_rear:[0.21590,0.12342,0.12700], lca_outer:[0.53340,-0.00318,0.11913],
  tie_rod_inner:[0.21908,-0.06985,0.15199], tie_rod_outer:[0.54293,-0.07303,0.17145],
  wheel_center:[0.55880,0.00000,0.20320],
  pushrod_outer:[0.43815,-0.00318,0.31953], pushrod_inner:[0.25740,-0.00318,0.64683],
  rocker_pivot:[0.21293,-0.00318,0.62230], rocker_spring_pt:[0.20749,-0.00318,0.67919],
  spring_chassis_pt:[0.01588,-0.00318,0.66091],
};
const REAR_HP = {
  uca_front:  [0.27940,1.44780,0.26975], uca_rear:[0.24778,1.65895,0.27148], uca_outer:[0.48895,1.54940,0.28075],
  lca_front:  [0.28158,1.44958,0.14356], lca_rear:[0.22860,1.65895,0.12700], lca_outer:[0.53340,1.53670,0.11913],
  tie_rod_inner:[0.28158,1.44958,0.14356], tie_rod_outer:[0.53340,1.46086,0.12631],
  wheel_center:[0.55880,1.53670,0.20320],
  pushrod_outer:[0.48260,1.54623,0.14448], pushrod_inner:[0.28110,1.54623,0.38765],
  rocker_pivot:[0.23708,1.54623,0.35118], rocker_spring_pt:[0.22585,1.54623,0.42657],
  spring_chassis_pt:[0.03545,1.54623,0.39817],
};
const VEH = {
  mass_kg: 290, unsprung_kg: 67, wheelbase_m: 1.537,
  track_f_m: 1.222, track_r_m: 1.200,
  cg_x: 0, cg_y: 0.845, cg_z: 0.280,
  weight_dist_f: 0.45,
  k_spring_f_lbpin: 125, k_spring_r_lbpin: 245,
  mr_f: 0.97, mr_r: 0.82,
  arb_f_Npm: 18850, arb_r_Npm: 8500,
  tire_od_m: 0.4064, tire_width_m: 0.1905,
};
const mirrorX = hp => Object.fromEntries(
  Object.entries(hp).map(([k,v]) => [k, [-v[0], v[1], v[2]]]));
const FL = FRONT_HP, FR = mirrorX(FRONT_HP);
const RL = REAR_HP,  RR = mirrorX(REAR_HP);

// ─── GEOMETRY MATH ─────────────────────────────────────────────────────
function intersect2D(p1, p2, p3, p4) {
  const d1x=p2[0]-p1[0], d1y=p2[1]-p1[1], d2x=p4[0]-p3[0], d2y=p4[1]-p3[1];
  const den = d1x*d2y - d1y*d2x;
  if (Math.abs(den) < 1e-12) return null;
  const t = ((p3[0]-p1[0])*d2y - (p3[1]-p1[1])*d2x)/den;
  return [p1[0]+t*d1x, p1[1]+t*d1y];
}
function vlen(a, b) { return Math.hypot(b[0]-a[0], b[1]-a[1], b[2]-a[2]); }

// ── Front-view IC + roll centre ──
function fvic(hp) {
  const uIn=[(hp.uca_front[0]+hp.uca_rear[0])/2,(hp.uca_front[2]+hp.uca_rear[2])/2];
  const uOut=[hp.uca_outer[0], hp.uca_outer[2]];
  const lIn=[(hp.lca_front[0]+hp.lca_rear[0])/2,(hp.lca_front[2]+hp.lca_rear[2])/2];
  const lOut=[hp.lca_outer[0], hp.lca_outer[2]];
  return intersect2D(uIn, uOut, lIn, lOut);
}
function rollCentre(hp) {
  const ic = fvic(hp); if (!ic) return null;
  const cp = [hp.wheel_center[0], 0];
  const m = (cp[1]-ic[1])/(cp[0]-ic[0]);
  return [0, hp.wheel_center[1], ic[1] + m*(0-ic[0])];
}
const fvic_F = fvic(FL), fvic_R = fvic(RL);
const frontRC = rollCentre(FL);
const rearRC  = rollCentre(RL);
const fvsa_F = fvic_F ? Math.hypot(fvic_F[0]-FL.wheel_center[0], fvic_F[1]) : null;
const fvsa_R = fvic_R ? Math.hypot(fvic_R[0]-RL.wheel_center[0], fvic_R[1]) : null;
const cg_F_degmm = fvsa_F ? (1/fvsa_F)*180/Math.PI/1000 : null;
const cg_R_degmm = fvsa_R ? (1/fvsa_R)*180/Math.PI/1000 : null;

// ── Pitch axis height at CG-y (roll axis interpolated to CG) ──
let pitchZ = 0;
if (frontRC && rearRC) {
  const t = (VEH.cg_y - frontRC[1])/(rearRC[1] - frontRC[1]);
  pitchZ = frontRC[2] + (rearRC[2] - frontRC[2])*t;
}
const ra_incl = (frontRC && rearRC)
  ? Math.atan2(rearRC[2]-frontRC[2], rearRC[1]-frontRC[1])*180/Math.PI : 0;

// ── Wishbone / arm metrics ──
const uca_len = (vlen(FL.uca_front, FL.uca_outer)+vlen(FL.uca_rear, FL.uca_outer))/2;
const lca_len = (vlen(FL.lca_front, FL.lca_outer)+vlen(FL.lca_rear, FL.lca_outer))/2;
const uca_r_len = (vlen(RL.uca_front, RL.uca_outer)+vlen(RL.uca_rear, RL.uca_outer))/2;
const lca_r_len = (vlen(RL.lca_front, RL.lca_outer)+vlen(RL.lca_rear, RL.lca_outer))/2;
const tie_len_F = vlen(FL.tie_rod_inner, FL.tie_rod_outer);
const tie_len_R = vlen(RL.tie_rod_inner, RL.tie_rod_outer);
const push_len_F = vlen(FL.pushrod_outer, FL.pushrod_inner);
const push_len_R = vlen(RL.pushrod_outer, RL.pushrod_inner);

// ── Upright / kingpin metrics ──
function uprightGeom(hp) {
  const kpVec = [hp.uca_outer[0]-hp.lca_outer[0],
                 hp.uca_outer[1]-hp.lca_outer[1],
                 hp.uca_outer[2]-hp.lca_outer[2]];
  // KPI in front view (X-Z): tilt from vertical
  const KPI = Math.atan2(hp.lca_outer[0]-hp.uca_outer[0], hp.uca_outer[2]-hp.lca_outer[2])*180/Math.PI;
  // Caster in side view (Y-Z): tilt from vertical
  const caster = Math.atan2(hp.uca_outer[1]-hp.lca_outer[1], hp.uca_outer[2]-hp.lca_outer[2])*180/Math.PI;
  // Ground intercept of kingpin axis
  const t_g = -hp.lca_outer[2] / kpVec[2];
  const kp_ground = [hp.lca_outer[0] + t_g*kpVec[0],
                     hp.lca_outer[1] + t_g*kpVec[1], 0];
  // Mechanical trail (Y direction, + = CP behind KP ground intercept)
  const mech_trail = (hp.wheel_center[1] - kp_ground[1])*1000;
  // Scrub radius (X direction, + = CP outboard of KP ground intercept)
  const scrub_radius = (hp.wheel_center[0] - kp_ground[0])*1000;
  // Spindle length: from KP-axis line to wheel center perpendicular
  return { KPI, caster, mech_trail, scrub_radius, kp_ground };
}
const ug_F = uprightGeom(FL), ug_R = uprightGeom(RL);

// ── Steering metrics ──
function steerGeom(hp) {
  // Plan-view kingpin position (use ground intercept for steer arm reference)
  const kpVec = [hp.uca_outer[0]-hp.lca_outer[0],
                 hp.uca_outer[1]-hp.lca_outer[1],
                 hp.uca_outer[2]-hp.lca_outer[2]];
  // Use kingpin axis intersection at the tie-rod outer height
  const t_h = (hp.tie_rod_outer[2] - hp.lca_outer[2]) / kpVec[2];
  const kp_at_h = [hp.lca_outer[0] + t_h*kpVec[0],
                   hp.lca_outer[1] + t_h*kpVec[1]];
  const armLen = Math.hypot(hp.tie_rod_outer[0]-kp_at_h[0], hp.tie_rod_outer[1]-kp_at_h[1]);
  const armOffsetY = hp.tie_rod_outer[1] - kp_at_h[1];  // − = forward of kingpin
  const tieAngle = Math.atan2(hp.tie_rod_outer[0]-hp.tie_rod_inner[0],
                              hp.tie_rod_outer[1]-hp.tie_rod_inner[1])*180/Math.PI;
  return { armLen, armOffsetY, tieAngle, kp_at_h };
}
const sg = steerGeom(FL);

// ── Actual Ackermann (2-D circle-intersection solve) ──
function ackToe(hp, rackDX) {
  const in_new = [hp.tie_rod_inner[0] + rackDX, hp.tie_rod_inner[1]];
  const tr0 = [hp.tie_rod_outer[0], hp.tie_rod_outer[1]];
  const tieL = Math.hypot(tr0[0]-hp.tie_rod_inner[0], tr0[1]-hp.tie_rod_inner[1]);
  const kpVec = [hp.uca_outer[0]-hp.lca_outer[0], hp.uca_outer[1]-hp.lca_outer[1],
                 hp.uca_outer[2]-hp.lca_outer[2]];
  const t_h = (hp.tie_rod_outer[2] - hp.lca_outer[2]) / kpVec[2];
  const kp = [hp.lca_outer[0] + t_h*kpVec[0], hp.lca_outer[1] + t_h*kpVec[1]];
  const armL = Math.hypot(tr0[0]-kp[0], tr0[1]-kp[1]);
  const dx = kp[0]-in_new[0], dy = kp[1]-in_new[1];
  const d = Math.hypot(dx, dy);
  if (d > tieL+armL || d < Math.abs(tieL-armL)) return null;
  const a = (tieL*tieL - armL*armL + d*d)/(2*d);
  const h2 = tieL*tieL - a*a; if (h2 < 0) return null;
  const h = Math.sqrt(h2);
  const px = in_new[0] + a*dx/d, py = in_new[1] + a*dy/d;
  const s1 = [px + h*(-dy)/d, py + h*dx/d];
  const s2 = [px - h*(-dy)/d, py - h*dx/d];
  const d1 = (s1[0]-tr0[0])**2 + (s1[1]-tr0[1])**2;
  const d2_ = (s2[0]-tr0[0])**2 + (s2[1]-tr0[1])**2;
  const sol = d1 < d2_ ? s1 : s2;
  const a0 = Math.atan2(tr0[1]-kp[1], tr0[0]-kp[0]);
  const a1 = Math.atan2(sol[1]-kp[1], sol[0]-kp[0]);
  let dA = a1 - a0;
  if (dA > Math.PI) dA -= 2*Math.PI;
  if (dA < -Math.PI) dA += 2*Math.PI;
  return dA*180/Math.PI;  // wheel toe change, degrees
}
// Ackermann % at a representative steer
function ackermannPctAtSteer(targetDeg) {
  // Sweep rack DX until the larger of |FL|, |FR| crosses targetDeg
  for (let dx = 0.001; dx < 0.08; dx += 0.001) {
    const tF = Math.abs(ackToe(FL, dx)), tR = Math.abs(ackToe(FR, dx));
    if (tF === null || tR === null) continue;
    const outer = Math.min(tF, tR), inner = Math.max(tF, tR);
    if (outer >= targetDeg) {
      const L = VEH.wheelbase_m, t = VEH.track_f_m;
      const ideal_inner = Math.atan(L/(L/Math.tan(outer*Math.PI/180) - t))*180/Math.PI;
      const diff_actual = inner - outer;
      const diff_ideal  = ideal_inner - outer;
      return diff_ideal > 1e-3 ? (diff_actual/diff_ideal)*100 : null;
    }
  }
  return null;
}
const ack10 = ackermannPctAtSteer(10);
const ack20 = ackermannPctAtSteer(20);

// ── Wheel rate, ride freq, roll/pitch stiffness ──
const k_w_f = VEH.k_spring_f_lbpin * 175.127 * VEH.mr_f**2;   // N/m
const k_w_r = VEH.k_spring_r_lbpin * 175.127 * VEH.mr_r**2;
const m_corner_f = VEH.mass_kg * VEH.weight_dist_f / 2;
const m_corner_r = VEH.mass_kg * (1-VEH.weight_dist_f) / 2;
const f_ride_f = (1/(2*Math.PI))*Math.sqrt(k_w_f/m_corner_f);
const f_ride_r = (1/(2*Math.PI))*Math.sqrt(k_w_r/m_corner_r);
const K_roll_F = (k_w_f + VEH.arb_f_Npm) * VEH.track_f_m**2 / 2;
const K_roll_R = (k_w_r + VEH.arb_r_Npm) * VEH.track_r_m**2 / 2;
const K_roll_tot = K_roll_F + K_roll_R;
const LLTD_el = K_roll_F/K_roll_tot*100;
const m_sprung = VEH.mass_kg - VEH.unsprung_kg;
const h_arm = VEH.cg_z - pitchZ;
const roll_grad = m_sprung*9.81*h_arm / K_roll_tot * 180/Math.PI; // deg/g
const a_dist = VEH.cg_y;
const b_dist = VEH.wheelbase_m - VEH.cg_y;
const K_pitch = 2*(k_w_f*a_dist*a_dist + k_w_r*b_dist*b_dist);
const pitch_grad = m_sprung*9.81*h_arm / K_pitch * 180/Math.PI;
const lt_long_1g = VEH.mass_kg*9.81*VEH.cg_z / VEH.wheelbase_m;
const lt_lat_1g_F = VEH.mass_kg*9.81 * VEH.cg_z / VEH.track_f_m * (LLTD_el/100);
const lt_lat_1g_R = VEH.mass_kg*9.81 * VEH.cg_z / VEH.track_r_m * (1-LLTD_el/100);

// ── Static corner loads (no transfer) ──
const Wcorner_F = VEH.mass_kg*9.81 * VEH.weight_dist_f / 2;
const Wcorner_R = VEH.mass_kg*9.81 * (1-VEH.weight_dist_f) / 2;
const sag_F = Wcorner_F/k_w_f*1000;   // mm
const sag_R = Wcorner_R/k_w_r*1000;

// ─── INFO PANEL CONTENT (VD-relevant) ──────────────────────────────────
const fmt = (v, d=1, u='') => v == null || isNaN(v) ? '—' : `${v.toFixed(d)}${u}`;
const INFO = {
  'wishbones': {
    title: 'Wishbones · A-Arms',
    body: 'Unequal-length non-parallel SLA. Length ratio + inclination set the front-view instant centre; FVSA length sets camber gain in bump; arm angles set the roll-centre height and migration.',
    specs: [
      ['F UCA / LCA arm', `${fmt(uca_len*1000,0,'')} / ${fmt(lca_len*1000,0,' mm')}`],
      ['R UCA / LCA arm', `${fmt(uca_r_len*1000,0,'')} / ${fmt(lca_r_len*1000,0,' mm')}`],
      ['F length ratio U/L', fmt(uca_len/lca_len, 2)],
      ['F FVSA @ design', fmt(fvsa_F*1000, 0, ' mm')],
      ['R FVSA @ design', fmt(fvsa_R*1000, 0, ' mm')],
      ['F camber gain (lin.)', fmt(cg_F_degmm, 3, ' °/mm')],
      ['R camber gain (lin.)', fmt(cg_R_degmm, 3, ' °/mm')],
      ['F / R RC height', `${fmt(frontRC?.[2]*1000,1,'')} / ${fmt(rearRC?.[2]*1000,1,' mm')}`],
    ],
  },
  'steering': {
    title: 'Steering Rack &amp; Tie Rods',
    body: 'Rack-and-pinion driving both tie rods. Steer-arm length × offset Y relative to the kingpin axis sets the Ackermann curve. Forward arm offset → anti-Ack tendency.',
    specs: [
      ['Steer-arm length', fmt(sg.armLen*1000, 1, ' mm')],
      ['Steer-arm offset Y', `${fmt(sg.armOffsetY*1000, 1, ' mm')}  ${sg.armOffsetY<0?'(fwd of KP)':'(aft of KP)'}`],
      ['Tie-rod length', fmt(tie_len_F*1000, 1, ' mm')],
      ['Tie-rod plan-view angle', fmt(sg.tieAngle, 1, '°')],
      ['Ackermann % @ 10° outer', fmt(ack10, 0, ' %')],
      ['Ackermann % @ 20° outer', fmt(ack20, 0, ' %')],
    ],
    chart: 'ackermann',
  },
  'spring-damper': {
    title: 'Pushrod · Rocker · Spring',
    body: 'Pushrod transmits wheel load to a chassis-mounted bell-crank. Motion ratio MR = Δ_spring / Δ_wheel; wheel rate = K_spring · MR². Corner mass + wheel rate sets ride frequency.',
    specs: [
      ['F MR  /  R MR', `${VEH.mr_f.toFixed(2)} / ${VEH.mr_r.toFixed(2)}`],
      ['F spring  /  R spring', `${VEH.k_spring_f_lbpin} / ${VEH.k_spring_r_lbpin} lbf/in`],
      ['F wheel rate', fmt(k_w_f/1000, 2, ' N/mm')],
      ['R wheel rate', fmt(k_w_r/1000, 2, ' N/mm')],
      ['F ride freq', fmt(f_ride_f, 2, ' Hz')],
      ['R ride freq', fmt(f_ride_r, 2, ' Hz')],
      ['F static sag', fmt(sag_F, 1, ' mm')],
      ['R static sag', fmt(sag_R, 1, ' mm')],
      ['F pushrod length', fmt(push_len_F*1000, 0, ' mm')],
    ],
    chart: 'wheelrate',
  },
  'upright': {
    title: 'Upright · Kingpin Axis',
    body: 'Line from LCA-BJ to UCA-BJ = kingpin axis. KPI gives weight-jacking / self-aligning torque under steer; caster gives camber-with-steer; scrub radius + trail set the steering torque from Fx and Fy at the contact patch.',
    specs: [
      ['F KPI  /  R KPI', `${fmt(ug_F.KPI,1,'°')} / ${fmt(ug_R.KPI,1,'°')}`],
      ['F caster  /  R caster', `${fmt(ug_F.caster,1,'°')} / ${fmt(ug_R.caster,1,'°')}`],
      ['F mechanical trail', fmt(ug_F.mech_trail, 1, ' mm')],
      ['F scrub radius', fmt(ug_F.scrub_radius, 1, ' mm')],
      ['Kingpin length', fmt(vlen(FL.uca_outer, FL.lca_outer)*1000, 1, ' mm')],
    ],
  },
  'wheels': {
    title: 'Wheels &amp; Tires',
    body: 'Hoosier 16×7.5-10 R20. Track / wheelbase ratio drives yaw inertia and chassis response. Tire vertical stiffness adds in series with the wheel rate to set the true ride frequency.',
    specs: [
      ['Wheelbase', fmt(VEH.wheelbase_m*1000, 0, ' mm')],
      ['F / R track', `${fmt(VEH.track_f_m*1000,0,'')} / ${fmt(VEH.track_r_m*1000,0,' mm')}`],
      ['Tire OD / width', `${fmt(VEH.tire_od_m*1000,0,'')} / ${fmt(VEH.tire_width_m*1000,0,' mm')}`],
      ['Track / wheelbase', fmt(((VEH.track_f_m+VEH.track_r_m)/2)/VEH.wheelbase_m, 2)],
    ],
  },
  'cg': {
    title: 'Centre of Gravity',
    body: 'Total + sprung CG. CG height drives every load-transfer term: lateral ΔFz = m·ay·h/t per axle, longitudinal ΔFz = m·ax·h/L total. Weight distribution sets the static axle balance.',
    specs: [
      ['Total mass', fmt(VEH.mass_kg, 0, ' kg')],
      ['Sprung mass', fmt(m_sprung, 0, ' kg')],
      ['CG height (h_cg)', fmt(VEH.cg_z*1000, 0, ' mm')],
      ['CG behind F axle (a)', fmt(VEH.cg_y*1000, 0, ' mm')],
      ['CG ahead of R axle (b)', fmt(b_dist*1000, 0, ' mm')],
      ['Weight dist F / R', `${(VEH.weight_dist_f*100)|0} / ${((1-VEH.weight_dist_f)*100)|0}`],
      ['Static corner F / R', `${fmt(Wcorner_F,0,'')} / ${fmt(Wcorner_R,0,' N')}`],
    ],
  },
  'roll-axis': {
    title: 'Roll Axis',
    body: 'Geometric line from front RC to rear RC. Sprung mass rolls about this line under lateral acceleration; the moment arm = h_cg − h_RA at the CG-y. Spring + ARB roll stiffness reacts the resulting couple.',
    specs: [
      ['F RC height', fmt(frontRC?.[2]*1000, 1, ' mm')],
      ['R RC height', fmt(rearRC?.[2]*1000, 1, ' mm')],
      ['RA inclination', fmt(ra_incl, 2, '°')],
      ['Sprung CG above RA @ CG-y', fmt(h_arm*1000, 0, ' mm')],
      ['K_roll  F  / R', `${fmt(K_roll_F*Math.PI/180,0,'')} / ${fmt(K_roll_R*Math.PI/180,0,' Nm/°')}`],
      ['K_roll total', fmt(K_roll_tot*Math.PI/180, 0, ' Nm/°')],
      ['Roll gradient', fmt(roll_grad, 2, ' °/g')],
      ['Elastic LLTD', fmt(LLTD_el, 1, ' % front')],
      ['ΔFz lat @ 1g  F / R', `${fmt(lt_lat_1g_F,0,'')} / ${fmt(lt_lat_1g_R,0,' N')}`],
    ],
  },
  'pitch-axis': {
    title: 'Pitch Axis',
    body: 'Lateral axis at CG-y, at the roll-axis height interpolated to the CG. Mirror of the roll axis for pitch motion: pitch moment = m_s · ax · (h_cg − h_PA), reacted by axle wheel-rates over the wheelbase.',
    specs: [
      ['PA height @ CG-y', fmt(pitchZ*1000, 1, ' mm')],
      ['Sprung CG above PA', fmt(h_arm*1000, 0, ' mm')],
      ['K_pitch', fmt(K_pitch*Math.PI/180, 0, ' Nm/°')],
      ['Pitch gradient', fmt(pitch_grad, 2, ' °/g')],
      ['Long. ΔFz @ 1g (total)', fmt(lt_long_1g, 0, ' N')],
      ['Pitch moment @ 1g', fmt(m_sprung*9.81*h_arm, 0, ' Nm')],
    ],
  },
};

// ─── MONOTONE SVG CHARTS ───────────────────────────────────────────────
function ackermannChart() {
  const w=320, h=160, mx=28, my=18;
  let svg = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">`;
  // Sweep outer 0–25°, compute actual inner from rack solve
  const maxAng = 25;
  // Reference: 100% Ackermann
  let path100 = '';
  for (let o = 0.5; o <= maxAng; o += 0.5) {
    const oRad = o*Math.PI/180;
    const L = VEH.wheelbase_m, t = VEH.track_f_m;
    const iIdeal = Math.atan(L/(L/Math.tan(oRad) - t))*180/Math.PI;
    const x = mx + (w-2*mx)*o/maxAng;
    const y = h-my - (h-2*my)*iIdeal/maxAng;
    path100 += (path100?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
  }
  // Reference: parallel steer (45° diagonal)
  const x0=mx, y0=h-my, x1=mx+(w-2*mx), y1=my;
  let pathPar = `M${x0} ${y0}L${x1} ${y1}`;
  // Actual car: sweep rack
  const ackPts = [];
  for (let dx = 0.001; dx < 0.08; dx += 0.001) {
    const tF = ackToe(FL, dx), tR = ackToe(FR, dx);
    if (tF == null || tR == null) continue;
    const aF = Math.abs(tF), aR = Math.abs(tR);
    const outer = Math.min(aF, aR), inner = Math.max(aF, aR);
    if (outer > maxAng) break;
    ackPts.push([outer, inner]);
  }
  let pathAct = '';
  for (const [o,i] of ackPts) {
    const x = mx + (w-2*mx)*o/maxAng;
    const y = h-my - (h-2*my)*Math.min(i, maxAng)/maxAng;
    pathAct += (pathAct?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
  }
  // Axes
  svg += `<line x1="${mx}" y1="${h-my}" x2="${w-mx}" y2="${h-my}" stroke="#444"/>`;
  svg += `<line x1="${mx}" y1="${my}" x2="${mx}" y2="${h-my}" stroke="#444"/>`;
  // Reference lines
  svg += `<path d="${pathPar}" stroke="#444" stroke-width="1" stroke-dasharray="2 3" fill="none"/>`;
  svg += `<path d="${path100}" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>`;
  // Actual
  svg += `<path d="${pathAct}" stroke="#fff" stroke-width="2" fill="none"/>`;
  // Labels
  svg += `<text x="${mx-4}" y="${h-my+11}" fill="#888" font-size="9" text-anchor="end">0°</text>`;
  svg += `<text x="${w-mx}" y="${h-my+11}" fill="#888" font-size="9" text-anchor="end">${maxAng}°</text>`;
  svg += `<text x="${mx-4}" y="${my+8}" fill="#888" font-size="9" text-anchor="end">${maxAng}°</text>`;
  svg += `<text x="${w/2}" y="${h-3}" fill="#888" font-size="9.5" text-anchor="middle">outer wheel angle</text>`;
  svg += `<text transform="rotate(-90 12 ${h/2})" x="12" y="${h/2}" fill="#888" font-size="9.5" text-anchor="middle">inner wheel angle</text>`;
  svg += `<text x="${mx+8}" y="${my+10}" fill="#fff" font-size="10">actual</text>`;
  svg += `<text x="${mx+8}" y="${my+22}" fill="#888" font-size="9.5">100 % Ackermann</text>`;
  svg += `<text x="${mx+8}" y="${my+34}" fill="#666" font-size="9.5">parallel steer</text>`;
  svg += `</svg>`;
  return `<div class="mini-chart"><div class="mini-chart-title">Ackermann curve — inner vs outer wheel angle</div>${svg}</div>`;
}
function wheelrateChart() {
  const w=320, h=130, mx=30, my=18;
  let svg = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">`;
  // F and R wheel rate vs travel — using simple MR²(τ) curvature approximation
  // Without solver we just draw nominal values + linearity note
  const kf = k_w_f/1000, kr = k_w_r/1000;
  const yMax = Math.max(kf, kr)*1.25;
  // Front (white solid)
  let pF = '', pR = '';
  for (let i = 0; i <= 20; i++) {
    const tau = (i-10)*5; // mm
    const fac = 1 + 0.00015*tau*tau; // gentle parabolic shape
    const xF = mx + (w-2*mx)*i/20;
    const yF = h-my - (h-2*my)*(kf*fac)/yMax;
    const yR = h-my - (h-2*my)*(kr*fac)/yMax;
    pF += (i?'L':'M')+xF.toFixed(1)+' '+yF.toFixed(1);
    pR += (i?'L':'M')+xF.toFixed(1)+' '+yR.toFixed(1);
  }
  svg += `<line x1="${mx}" y1="${h-my}" x2="${w-mx}" y2="${h-my}" stroke="#444"/>`;
  svg += `<line x1="${mx}" y1="${my}" x2="${mx}" y2="${h-my}" stroke="#444"/>`;
  svg += `<line x1="${mx+(w-2*mx)/2}" y1="${my}" x2="${mx+(w-2*mx)/2}" y2="${h-my}" stroke="#333" stroke-dasharray="2 3"/>`;
  svg += `<path d="${pF}" stroke="#fff" stroke-width="2" fill="none"/>`;
  svg += `<path d="${pR}" stroke="#888" stroke-width="2" stroke-dasharray="4 3" fill="none"/>`;
  svg += `<text x="${mx-4}" y="${h-my+11}" fill="#888" font-size="9" text-anchor="end">−50</text>`;
  svg += `<text x="${w-mx}" y="${h-my+11}" fill="#888" font-size="9" text-anchor="end">+50 mm</text>`;
  svg += `<text x="${w/2}" y="${h-3}" fill="#888" font-size="9.5" text-anchor="middle">wheel travel</text>`;
  svg += `<text x="${mx+8}" y="${my+10}" fill="#fff" font-size="10">front</text>`;
  svg += `<text x="${mx+8}" y="${my+22}" fill="#888" font-size="9.5">rear</text>`;
  svg += `</svg>`;
  return `<div class="mini-chart"><div class="mini-chart-title">Wheel rate vs travel (qualitative)</div>${svg}</div>`;
}

// ─── THREE.JS SCENE ────────────────────────────────────────────────────
const viewer = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
renderer.setClearColor(0x000000);
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, viewer.clientWidth/viewer.clientHeight, 0.05, 50);
camera.up.set(0, 0, 1);
camera.position.set(3.5, -2.8, 1.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.77, 0.28);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.PAN };
controls.update();

const grid = new THREE.GridHelper(8, 32, 0x242424, 0x121212);
grid.rotation.x = Math.PI/2;
scene.add(grid);

function makeLine(p1, p2, color, group, lw=3) {
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...p1), new THREE.Vector3(...p2)]);
  const line = new THREE.Line(g, new THREE.LineBasicMaterial({ color, linewidth: lw }));
  line.userData.group = group;
  return line;
}
function makeSphere(p, color, r, group, opacity=1) {
  const g = new THREE.SphereGeometry(r, 16, 16);
  const m = new THREE.MeshBasicMaterial({ color, transparent: opacity<1, opacity });
  const s = new THREE.Mesh(g, m);
  s.position.set(...p);
  s.userData.group = group;
  return s;
}
function makeTriangle(p1, p2, p3, color, group, opacity=0.35) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute([...p1,...p2,...p3],3));
  g.setIndex([0,1,2]); g.computeVertexNormals();
  const m = new THREE.MeshBasicMaterial({ color, transparent:true, opacity, side: THREE.DoubleSide });
  const t = new THREE.Mesh(g, m); t.userData.group = group;
  return t;
}
function makeTire(center, halfW, group) {
  const r = VEH.tire_od_m/2;
  const g = new THREE.CylinderGeometry(r, r, halfW*2, 36, 1, true);
  g.rotateZ(Math.PI/2);
  const m = new THREE.MeshBasicMaterial({ color: 0x1a1a1a, transparent:true, opacity:0.55, side: THREE.DoubleSide });
  const t = new THREE.Mesh(g, m); t.position.set(...center); t.userData.group = group;
  return t;
}
function makeRack(p1, p2, color, group, radius=0.018) {
  const v1 = new THREE.Vector3(...p1), v2 = new THREE.Vector3(...p2);
  const dir = v2.clone().sub(v1);
  const len = dir.length();
  const g = new THREE.CylinderGeometry(radius, radius, len, 16);
  // Default cylinder axis is Y → rotate to align with dir
  const m = new THREE.MeshBasicMaterial({ color });
  const mesh = new THREE.Mesh(g, m);
  mesh.position.copy(v1.clone().add(v2).multiplyScalar(0.5));
  // Align Y-axis to dir
  const up = new THREE.Vector3(0,1,0);
  const axis = new THREE.Vector3().crossVectors(up, dir.clone().normalize());
  const angle = Math.acos(up.dot(dir.clone().normalize()));
  if (axis.length() > 1e-6) mesh.quaternion.setFromAxisAngle(axis.normalize(), angle);
  mesh.userData.group = group;
  return mesh;
}

const COL = {
  uca:0x42A5F5, lca:0xEF5350, tie:0x66BB6A, push:0xFFA726,
  spring:0xCCCCCC, rocker:0xCE93D8, upright:0xA67C52,
  rack:0xB8B8B8, chassisPt:0x5DADE2, movingPt:0xEF5350,
  rollAxis:0xffffff, pitchAxis:0xbbbbbb, cg:0xffffff,
};
function buildCorner(hp, label) {
  const g = new THREE.Group(); g.name = label;
  const add = (m) => g.add(m);
  add(makeLine(hp.uca_front, hp.uca_outer, COL.uca, 'wishbones'));
  add(makeLine(hp.uca_rear,  hp.uca_outer, COL.uca, 'wishbones'));
  add(makeLine(hp.lca_front, hp.lca_outer, COL.lca, 'wishbones'));
  add(makeLine(hp.lca_rear,  hp.lca_outer, COL.lca, 'wishbones'));
  add(makeLine(hp.tie_rod_inner, hp.tie_rod_outer, COL.tie, 'steering'));
  add(makeTriangle(hp.uca_outer, hp.lca_outer, hp.tie_rod_outer, COL.upright, 'upright'));
  add(makeLine(hp.uca_outer, hp.lca_outer, COL.upright, 'upright', 2));
  add(makeLine(hp.lca_outer, hp.tie_rod_outer, COL.upright, 'upright', 2));
  add(makeLine(hp.tie_rod_outer, hp.uca_outer, COL.upright, 'upright', 2));
  add(makeLine(hp.pushrod_outer, hp.pushrod_inner, COL.push, 'spring-damper'));
  add(makeTriangle(hp.rocker_pivot, hp.pushrod_inner, hp.rocker_spring_pt, COL.rocker, 'spring-damper', 0.5));
  add(makeLine(hp.rocker_pivot, hp.pushrod_inner, COL.rocker, 'spring-damper', 2));
  add(makeLine(hp.pushrod_inner, hp.rocker_spring_pt, COL.rocker, 'spring-damper', 2));
  add(makeLine(hp.rocker_spring_pt, hp.rocker_pivot, COL.rocker, 'spring-damper', 2));
  add(makeLine(hp.rocker_spring_pt, hp.spring_chassis_pt, COL.spring, 'spring-damper', 4));
  add(makeTire(hp.wheel_center, VEH.tire_width_m/2, 'wheels'));
  const chPts = ['uca_front','uca_rear','lca_front','lca_rear','tie_rod_inner','rocker_pivot','spring_chassis_pt'];
  for (const k in hp) {
    const grp = ['pushrod_outer','pushrod_inner','rocker_pivot','rocker_spring_pt','spring_chassis_pt'].includes(k)
        ? 'spring-damper'
        : (['tie_rod_inner','tie_rod_outer'].includes(k) ? 'steering'
        : (k.startsWith('uca')||k.startsWith('lca') ? 'wishbones'
        : (k === 'wheel_center' ? 'wheels' : 'wishbones')));
    add(makeSphere(hp[k], chPts.includes(k) ? COL.chassisPt : COL.movingPt, 0.012, grp));
  }
  return g;
}
scene.add(buildCorner(FL,'FL')); scene.add(buildCorner(FR,'FR'));
scene.add(buildCorner(RL,'RL')); scene.add(buildCorner(RR,'RR'));

// ─── STEERING RACK BAR (visible between FL and FR tie_rod_inner) ──
scene.add(makeRack(FL.tie_rod_inner, FR.tie_rod_inner, COL.rack, 'steering', 0.014));
// End caps
scene.add(makeSphere(FL.tie_rod_inner, COL.rack, 0.018, 'steering'));
scene.add(makeSphere(FR.tie_rod_inner, COL.rack, 0.018, 'steering'));

// ─── ROLL AXIS · CG · PITCH AXIS (monotone overlays) ──
if (frontRC && rearRC) {
  scene.add(makeSphere(frontRC, COL.rollAxis, 0.024, 'roll-axis', 0.7));
  scene.add(makeSphere(rearRC,  COL.rollAxis, 0.024, 'roll-axis', 0.7));
  scene.add(makeLine(frontRC, rearRC, COL.rollAxis, 'roll-axis', 2));
}
scene.add(makeSphere([VEH.cg_x, VEH.cg_y, VEH.cg_z], COL.cg, 0.030, 'cg', 0.8));
const halfTrack = (VEH.track_f_m+VEH.track_r_m)/4;
scene.add(makeLine([-halfTrack, VEH.cg_y, pitchZ], [+halfTrack, VEH.cg_y, pitchZ],
                   COL.pitchAxis, 'pitch-axis', 2));
scene.add(makeSphere([0, VEH.cg_y, pitchZ], COL.pitchAxis, 0.022, 'pitch-axis', 0.85));

// ─── HOVER + CLICK ─────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let currentGroup = null;

function findGroup(obj) {
  while (obj) { if (obj.userData?.group) return obj.userData.group; obj = obj.parent; }
  return null;
}
function setGroup(g) {
  if (g === currentGroup) return;
  currentGroup = g;
  const info = g ? INFO[g] : null;
  const panel = document.getElementById('info-panel');
  if (!info) {
    document.getElementById('panel-title').textContent = 'Double-Wishbone Layout';
    document.getElementById('panel-body').textContent = 'Hover any component in the 3D view, or pick from the list. Drag to orbit, scroll to zoom.';
    document.getElementById('panel-extras').innerHTML = '';
    panel.classList.remove('active');
  } else {
    document.getElementById('panel-title').innerHTML = info.title;
    document.getElementById('panel-body').textContent = info.body;
    let extras = '';
    if (info.specs) {
      extras += '<div class="specs">';
      for (const [k,v] of info.specs) extras += `<span>${k}</span><span>${v}</span>`;
      extras += '</div>';
    }
    if (info.chart === 'ackermann') extras += ackermannChart();
    if (info.chart === 'wheelrate') extras += wheelrateChart();
    document.getElementById('panel-extras').innerHTML = extras;
    panel.classList.add('active');
  }
  document.querySelectorAll('.part-btn').forEach(b => b.classList.toggle('active', b.dataset.group === g));
}

renderer.domElement.addEventListener('pointermove', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left)/rect.width)*2 - 1;
  pointer.y = -((e.clientY - rect.top)/rect.height)*2 + 1;
  raycaster.setFromCamera(pointer, camera);
  raycaster.params.Line.threshold = 0.025;
  raycaster.params.Points.threshold = 0.03;
  const hits = raycaster.intersectObjects(scene.children, true);
  setGroup(hits.length ? findGroup(hits[0].object) : null);
});
document.querySelectorAll('.part-btn').forEach(b => {
  b.addEventListener('click', () => setGroup(b.dataset.group));
});

window.addEventListener('resize', () => {
  camera.aspect = viewer.clientWidth/viewer.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
