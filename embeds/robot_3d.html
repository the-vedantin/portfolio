<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robot CAD - Interactive 3D</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(3, 3, 3, 0.92);
        --line: #242424;
        --text: #ffffff;
        --muted: #b8b8b8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #viewer {
        position: absolute;
        inset: 0;
      }

      .title {
        position: absolute;
        top: 22px;
        left: 24px;
        z-index: 2;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
      }

      .title p,
      .legend,
      .status {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .panel {
        position: absolute;
        right: 22px;
        top: 22px;
        z-index: 2;
        width: min(360px, calc(100vw - 44px));
        padding: 18px 20px;
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .panel p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .legend {
        position: absolute;
        left: 20px;
        bottom: 20px;
        z-index: 2;
        padding: 10px 14px;
        background: var(--panel);
        border: 1px solid var(--line);
      }

      .progress {
        position: absolute;
        inset: auto 24px 24px auto;
        z-index: 3;
        min-width: 220px;
        padding: 12px 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
      }

      .bar {
        height: 4px;
        margin-top: 9px;
        background: #161616;
        overflow: hidden;
      }

      .bar span {
        display: block;
        width: 0;
        height: 100%;
        background: #ffffff;
        transition: width 160ms ease;
      }

      @media (max-width: 760px) {
        .panel {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div class="title">
      <h1>DepthCharge CAD</h1>
      <p>2025 FRC competition robot</p>
    </div>
    <aside class="panel">
      <h2>DepthCharge Model</h2>
      <p>Orbit and pan around the 2025 DepthCharge competition robot CAD. Large assemblies can take a few seconds to load.</p>
    </aside>
    <div class="legend"><strong>Controls:</strong> Drag orbit / Right-drag pan</div>
    <div class="progress" id="progress">Loading model<div class="bar"><span id="bar"></span></div></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const viewer = document.querySelector("#viewer");
      const progress = document.querySelector("#progress");
      const bar = document.querySelector("#bar");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      window.__robotViewer = { loaded: false, meshCount: 0, error: null };

      const camera = new THREE.PerspectiveCamera(38, viewer.clientWidth / viewer.clientHeight, 0.01, 10000);
      camera.position.set(5, 4, 3);

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      viewer.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enableZoom = false;
      controls.dampingFactor = 0.08;
      controls.mouseButtons = {
        LEFT: THREE.MOUSE.ROTATE,
        MIDDLE: THREE.MOUSE.PAN,
        RIGHT: THREE.MOUSE.PAN
      };

      scene.add(new THREE.HemisphereLight(0xffffff, 0x202020, 2.2));
      const key = new THREE.DirectionalLight(0xffffff, 2.4);
      key.position.set(4, 6, 8);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0xffffff, 1.2);
      fill.position.set(-6, 3, -4);
      scene.add(fill);

      const grid = new THREE.GridHelper(10, 40, 0x242424, 0x121212);
      scene.add(grid);

      function getObjectBounds(object) {
        const box = new THREE.Box3();
        const meshBox = new THREE.Box3();
        const instanceMatrix = new THREE.Matrix4();
        const worldMatrix = new THREE.Matrix4();

        object.updateMatrixWorld(true);
        object.traverse((child) => {
          if (!child.isMesh || !child.geometry) return;
          if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();

          if (child.isInstancedMesh) {
            for (let i = 0; i < child.count; i += 1) {
              child.getMatrixAt(i, instanceMatrix);
              worldMatrix.multiplyMatrices(child.matrixWorld, instanceMatrix);
              meshBox.copy(child.geometry.boundingBox).applyMatrix4(worldMatrix);
              box.union(meshBox);
            }
            return;
          }

          meshBox.copy(child.geometry.boundingBox).applyMatrix4(child.matrixWorld);
          box.union(meshBox);
        });

        return box.isEmpty() ? new THREE.Box3().setFromObject(object) : box;
      }

      function fitCameraToObject(object) {
        const box = getObjectBounds(object);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim / (2 * Math.tan((Math.PI * camera.fov) / 360));
        const direction = new THREE.Vector3(1.25, 0.9, 0.7).normalize();

        controls.target.copy(center);
        camera.near = Math.max(maxDim / 1000, 0.01);
        camera.far = Math.max(maxDim * 100, 1000);
        camera.position.copy(center).add(direction.multiplyScalar(distance * 1.55));
        camera.updateProjectionMatrix();
        controls.update();

        grid.position.y = box.min.y;
        grid.scale.setScalar(Math.max(maxDim / 10, 1));

        return box;
      }

      const loader = new GLTFLoader();
      loader.load(
        "../assets/models/robot/robot-web-basic.glb?v=basic",
        (gltf) => {
          const model = gltf.scene;
          let meshCount = 0;
          model.traverse((child) => {
            if (child.isMesh) {
              meshCount += 1;
              child.castShadow = false;
              child.receiveShadow = false;
              if (child.material) {
                child.material.side = THREE.DoubleSide;
              }
            }
          });
          scene.add(model);
          const bounds = fitCameraToObject(model);
          window.__robotViewer = { loaded: true, meshCount, error: null };
          document.body.dataset.robotLoaded = "true";
          document.body.dataset.robotMeshCount = String(meshCount);
          document.body.dataset.robotBounds = bounds.min.toArray().concat(bounds.max.toArray()).map((n) => n.toFixed(4)).join(",");
          progress.remove();
        },
        (event) => {
          if (!event.total) return;
          const pct = Math.min(100, Math.round((event.loaded / event.total) * 100));
          bar.style.width = `${pct}%`;
          progress.firstChild.textContent = `Loading model ${pct}%`;
        },
        (error) => {
          const message = error?.message || error?.target?.statusText || error?.target?.responseURL || String(error);
          progress.textContent = `Model failed to load: ${message}`;
          window.__robotViewer = { loaded: false, meshCount: 0, error: message };
          document.body.dataset.robotError = message;
          console.error(error);
        }
      );

      window.addEventListener("resize", () => {
        camera.aspect = viewer.clientWidth / viewer.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(viewer.clientWidth, viewer.clientHeight);
      });

      function tick() {
        requestAnimationFrame(tick);
        controls.update();
        renderer.render(scene, camera);
      }

      tick();
    </script>
  </body>
</html>
